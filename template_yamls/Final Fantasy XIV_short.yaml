name: FFXIV_Short

# Used to describe your yaml. Useful if you have multiple files.
description: Short Final Fantasy XIV

game: Final Fantasy XIV
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.

Final Fantasy XIV:
  ################
  # Game Options #
  ################
  progression_balancing:
    normal: 50

  accessibility:
    full: 0
    minimal: 50

  goal:
    collect memories: 50

  mcguffins_needed:
    # Percentage of Distant Memories needed to win the game.
    20: 50

  boss_key_pieces:
    # Number of key pieces required to challenge the final boss (boss goal only).
    # Has no effect when goal is set to Collect Memories.
    0: 50

  duty_difficulty:
    normal: 50

  allow_main_scenario_duties:
    "false": 50

  extra_dungeon_checks:
    0: 50

  include_ocean_fishing:
    "false": 50

  include_pvp:
    "false": 50

  include_bozja:
    "false": 50

  dungeon_count:
    # Number of Dungeons per expansion to include in the location pool
    3: 50

  variant_dungeon_count:
    0: 50

  trial_count:
    # Number of Trials per expansion to include in the location pool
    3: 50

  extreme_trial_count:
    0: 50

  endgame_trial_count:
    0: 50

  alliance_raid_count:
    0: 50

  normal_raid_count:
    3: 50

  savage_raid_count:
    0: 50

  endgame_raid_count:
    0: 50

  ultimate_count:
    0: 50

  fatesanity:
    "false": 50

  include_unreasonable_fates:
    "false": 50

  fates_per_zone:
    3: 50

  fishsanity:
    disabled: 50

  fishsanity_disable_starting_bait:
    "false": 50

  force_jobs: []

  level_cap:
    100: 50

  death_link:
    "false": 50
    "true": 0

  include_guildhests:
    "false": 50

  ###########################
  # Item & Location Options #
  ###########################
  local_items: []

  non_local_items: []

  start_inventory: {}

  start_inventory_from_pool: {}

  start_hints: []

  start_location_hints: []

  exclude_locations: []

  priority_locations: []

  item_links: []

  plando_items: []
