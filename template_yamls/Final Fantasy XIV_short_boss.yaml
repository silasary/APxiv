name: FFXIV_Boss

# Used to describe your yaml. Useful if you have multiple files.
description: Final Fantasy XIV - Boss Goal (Random expansion boss, minimal duties and fates)

game: Final Fantasy XIV
requires:
    version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.

Final Fantasy XIV:
    ################
    # Game Options #
    ################
    progression_balancing:
        normal: 50

    accessibility:
        full: 0
        minimal: 50

    goal:
        defeat king thordan: 50
        defeat shinryu: 50
        defeat hades: 50
        defeat the endsinger: 50
        defeat sphene: 50

    mcguffins_needed:
        # Percentage of Distant Memories needed to win the game.
        20: 50

    boss_key_pieces:
        # Require collecting key pieces before you can challenge the final boss.
        # Set to 0 to skip the key gate entirely.
        3: 50

    duty_difficulty:
        normal: 50

    allow_main_scenario_duties:
        "false": 50

    extra_dungeon_checks:
        0: 50

    include_ocean_fishing:
        "false": 50

    include_pvp:
        "false": 50

    include_bozja:
        "false": 50

    dungeon_count:
        0: 50

    variant_dungeon_count:
        0: 50

    trial_count:
        3: 50

    extreme_trial_count:
        0: 50

    endgame_trial_count:
        0: 50

    alliance_raid_count:
        0: 50

    normal_raid_count:
        0: 50

    savage_raid_count:
        0: 50

    endgame_raid_count:
        0: 50

    ultimate_count:
        0: 50

    fatesanity:
        "false": 50

    include_unreasonable_fates:
        "false": 50

    fates_per_zone:
        1: 50

    fishsanity:
        disabled: 50

    fishsanity_disable_starting_bait:
        "false": 50

    force_jobs: []

    level_cap:
        100: 50

    death_link:
        "false": 50
        "true": 0

    include_guildhests:
        "false": 50

    ###########################
    # Item & Location Options #
    ###########################
    local_items: []

    non_local_items: []

    start_inventory: {}

    start_inventory_from_pool: {}

    start_hints: []

    start_location_hints: []

    exclude_locations: []

    priority_locations: []

    item_links: []

    plando_items: []
